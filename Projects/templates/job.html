<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>AD Job Console</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <style>
      :root{
        --bg:#121212; --panel:#171a1f; --panel-2:#1b1f26;
        --muted:#b5c1d1; --text:#e9eef5;
        --accent:#64ffda; --accent-2:#1de9b6;
        --ok:#00e676; --err:#ff5252; --info:#64b5f6;
        --border:#2a3240; --code:#0d1117;
      }
      *{box-sizing:border-box}
      body{
        margin:0; padding:24px; color:var(--text);
        background:
          radial-gradient(1000px 600px at 100% -10%, rgba(100,255,218,.09), transparent 60%),
          radial-gradient(1000px 600px at -10% 10%, rgba(29,233,182,.06), transparent 60%),
          var(--bg);
        font-family:"Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .logo-wrap{
        position:fixed; top:18px; right:18px; z-index:10; opacity:.95;
        filter: drop-shadow(0 6px 18px rgba(0,0,0,.45));
      }
      .logo-wrap img{ width:260px; height:auto; }

      .container{ max-width:1100px; margin:0 auto; }
      .card{
        background: linear-gradient(180deg, var(--panel), var(--panel-2));
        border:1px solid var(--border);
        border-radius:14px; padding:18px 20px;
        box-shadow:0 10px 30px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.02);
      }
      .topbar{ display:flex; align-items:center; gap:10px; margin-bottom:6px; }
      a.btn{
        color:#0b0f13; text-decoration:none; font-weight:700;
        background:linear-gradient(135deg, var(--accent), var(--accent-2));
        padding:10px 12px; border-radius:10px; display:inline-block;
        box-shadow:0 6px 16px rgba(100,255,218,.20);
      }
      h1{ margin:6px 0 4px; color:var(--accent); font-size:26px; letter-spacing:.3px; }
      p.muted{ color:var(--muted); margin:6px 0 16px; }

      pre#log{
        background: linear-gradient(180deg, #0b1020, #0c1222);
        color:#e6f1ff;
        border:1px solid #1e2533;
        border-radius:12px;
        padding:14px 16px;
        height:430px; overflow:auto;
        box-shadow: inset 0 0 0 1px rgba(255,255,255,.02);
      }
      .status{ margin-top:12px; }
      .ok{ background: rgba(0,230,118,.08); color:var(--ok); border:1px solid var(--border); padding:10px 12px; border-radius:10px; }
      .err{ background: rgba(255,82,82,.08); color:var(--err); border:1px solid var(--border); padding:10px 12px; border-radius:10px; }

      .actions{ margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; }
      iframe.download{ display:none; width:0; height:0; border:0; }
    </style>
  </head>
  <body>
    <div class="logo-wrap">
      <img src="{{ url_for('static', filename='livingresources-logo.png') }}" alt="Living Resources Logo">
    </div>

    <div class="container">
      <div class="topbar">
        <a class="btn" href="/">← Back</a>
        <h1>Job Console</h1>
      </div>
      <p class="muted">Streaming logs in real time. You can leave this page; your download remains available for ~10 minutes.</p>

      <div class="card">
        <pre id="log" aria-live="polite" aria-atomic="true"></pre>
        <div id="status" class="status"></div>
        <div id="actions" class="actions"></div>
        <iframe id="dl" class="download"></iframe>
      </div>
    </div>

    <script>
      const logEl = document.getElementById('log');
      const statusEl = document.getElementById('status');
      const actionsEl = document.getElementById('actions');
      const dlFrame = document.getElementById('dl');

      function append(line){
        logEl.textContent += line + "\n";
        logEl.scrollTop = logEl.scrollHeight;
      }

      // Live stream via SSE
      const es = new EventSource("/stream/{{ job_id }}");
      es.onmessage = (e)=> append(e.data);
      es.addEventListener('done', (e)=>{
        es.close();
        checkResult();
      });
      es.onerror = ()=> append("…connection hiccup (stream will finish shortly).");

      function checkResult(){
        fetch("/result/{{ job_id }}", {cache:'no-store'})
          .then(r=>r.json())
          .then(j=>{
            if(!j.done){ setTimeout(checkResult, 800); return; }
            if(j.success){
              statusEl.innerHTML = `
                <div class="ok">
                  Success. Processed ${j.count} users. Your download should start automatically.<br>
                  <strong>Note:</strong> Microsoft 365 directory sync may take up to ~30 minutes to fully reflect changes.<br>
                  The ZIP includes <code>AssignOffice365E1.ps1</code> that assigns <strong>Office 365 E1</strong> licenses using <code>summary.xlsx</code>.
                </div>`;
              actionsEl.innerHTML = `<a class="btn" href="${j.download_url}">Download now</a>`;
              dlFrame.src = j.download_url;
            }else{
              statusEl.innerHTML = `<div class="err">Run failed. Download the error bundle for details.</div>`;
              actionsEl.innerHTML = `<a class="btn" href="${j.download_url}">Download error bundle</a>`;
            }
          })
          .catch(()=> setTimeout(checkResult, 1000));
      }
    </script>
  </body>
</html>
